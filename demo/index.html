<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Effect LINE Manager Demo</title>
    <style>
      :root {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #17211b;
        background: #eef4f0;
        font-synthesis: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 20rem;
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 12% 0%, rgb(6 199 85 / 12%), transparent 28rem), #eef4f0;
      }

      .demo-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        width: min(100% - 2rem, 72rem);
        margin: 0 auto;
        padding: 1.25rem 0;
      }

      .demo-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .demo-mark {
        display: grid;
        width: 2.5rem;
        height: 2.5rem;
        place-items: center;
        border-radius: 0.75rem;
        background: #06c755;
        color: white;
        font-weight: 800;
        box-shadow: 0 0.5rem 1.25rem rgb(6 199 85 / 22%);
      }

      .demo-title,
      .demo-subtitle,
      .demo-status {
        margin: 0;
      }

      .demo-title {
        font-size: 1rem;
      }

      .demo-subtitle,
      .demo-status {
        color: #5b6b61;
        font-size: 0.8125rem;
      }

      .demo-status {
        max-width: 28rem;
        padding: 0.5rem 0.75rem;
        border: 1px solid #cfdad2;
        border-radius: 999px;
        background: rgb(255 255 255 / 70%);
        text-align: right;
      }

      main {
        padding-bottom: 3rem;
      }

      line-account-management {
        --line-account-page-background: rgb(255 255 255 / 72%);
        --line-account-surface-background: #fff;
        --line-account-content-width: 72rem;
        --line-account-page-padding: clamp(1rem, 3vw, 2rem);
        --line-account-primary-color: #06c755;
        --line-account-primary-text-color: #057b38;
        --line-account-focus-color: #82e5aa;
        --line-account-radius: 1rem;
        --line-account-dialog-radius: 1rem;
        --line-account-shadow: 0 0.75rem 2rem rgb(29 53 38 / 8%);
        display: block;
        width: min(100% - 2rem, 76rem);
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid rgb(202 216 206 / 80%);
        border-radius: 1.5rem;
        box-shadow: 0 1.5rem 4rem rgb(29 53 38 / 10%);
      }

      @media (max-width: 40rem) {
        .demo-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .demo-status {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <header class="demo-header">
      <div class="demo-brand">
        <span class="demo-mark" aria-hidden="true">L</span>
        <div>
          <p class="demo-title"><strong>Effect LINE Manager</strong></p>
          <p class="demo-subtitle">Interactive in-memory component preview</p>
        </div>
      </div>
      <p class="demo-status" id="demo-status" role="status" aria-live="polite">
        Changes stay in this browser session.
      </p>
    </header>
    <main>
      <line-account-management id="line-accounts"></line-account-management>
    </main>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
