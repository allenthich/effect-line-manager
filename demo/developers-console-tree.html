<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Effect LINE Manager — Developers Console Wrapper (Tree variant)</title>
    <style>
      :root {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }
      * {
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 12% 0%, rgb(16 185 129 / 12%), transparent 30rem), #f1f5f9;
      }
      .demo-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        width: min(100% - 2rem, 72rem);
        margin: 0 auto;
        padding: 2rem 0 1rem 0;
      }
      .demo-mark {
        display: grid;
        width: 2.5rem;
        height: 2.5rem;
        place-items: center;
        border-radius: 0.75rem;
        background: #10b981;
        color: white;
        font-weight: 800;
      }
      main {
        padding-bottom: 4rem;
      }
      line-developers-console {
        --line-account-surface-background: #ffffff;
        --line-account-border-color: #cbd5e1;
        --line-account-text-color: #0f172a;
        --line-account-muted-color: #64748b;
        --line-account-muted-background: #f1f5f9;
        --line-account-primary-color: #10b981;
        --line-account-radius: 1.25rem;
        --line-account-button-radius: 0.75rem;
        --line-account-fieldset-bg: #f8fafc;
        --line-account-selected-bg: #ecfdf5;
        display: block;
        width: min(100% - 2rem, 72rem);
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <header class="demo-header">
      <span class="demo-mark" aria-hidden="true">L</span>
      <div>
        <p style="margin: 0"><strong>LINE Developers Console Wrapper — Tree variant</strong></p>
        <p style="margin: 0; color: #64748b; font-size: 0.8125rem">
          IDE-style tree viewer with guide-line connectors
        </p>
      </div>
      <div style="margin-left: auto; display: flex; gap: 1rem; align-items: center">
        <a href="/index.html" style="font-size: 0.8rem">← List variant</a>
        <a href="/line-account-management.html" style="font-size: 0.8rem"
          >Line Account Management demo →</a
        >
      </div>
    </header>
    <main>
      <line-developers-console id="developers-console"></line-developers-console>
    </main>
    <script type="module" src="/developers-console-tree.ts"></script>
  </body>
</html>
